---
services:
  pg14:
    image: postgres:14-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "54314:5432"
    container_name: pg14
    volumes:
      - ./volumes/pg14/data:/var/lib/postgresql/data
  pg16:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "54316:5432"
    container_name: pg16
    volumes:
      - ./volumes/pg16/data:/var/lib/postgresql/data
  pg18:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "54318:5432"
    container_name: pg18
    volumes:
      - ./volumes/pg18/data:/var/lib/postgresql/data
  pg18bigm:
    image: ghcr.io/sonicgarden/postgresql-bigm:18
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "54328:5432"
    container_name: pg18bigm
    volumes:
      - ./volumes/pg18bigm/data:/var/lib/postgresql
  redis6:
    image: redis:6
    ports:
      - "6379:6379"
    container_name: redis6
