  mysql80:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: example
    ports:
      - "3308:3306"
    container_name: mysql80
    ulimits:
      nofile:
        soft: 8192
        hard: 8192
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_bin
      - --max-allowed-packet=128M
    volumes:
      - ./volumes/mysql80/data:/var/lib/mysql
